keys:
  # Admin devices
  - &admin_nixos_devbox "age1vcz0a9xzk96xcs8r224f9ckrauaatltej7c9dm3rag8wtn92lc4qy70emv"
  - &admin_school_laptop "age1xkt3kv7ycd5dh4lqk38kpf7tqvfaj4xqaz57p80qhan9s99p0cyshj0r5f"
  # - &admin_desktop "AGE-RECIPIENT-FOR-desktop"

  # Other devices
  - &core_vm_gitea_01 "age1hgtwcdx92kp6s7us6d8lr9473kf23sg6ujse7msuuek75qxz0gmqva3wt7"
  - &core_vm_nixhelper_01 "age1yj0t0ljh2tygk5cntqml5y4vdu6zfszcuvnk5u98xt84j25q3a4q22ggrj"
  - &laptop "AGE-RECIPIENT-FOR-laptop"

creation_rules:
  # Shared secrets for admins only
  - path_regex: secrets/common\.ya?ml
    key_groups:
      - &admin_group
        age:
          - *admin_nixos_devbox
          - *admin_school_laptop
          # - *admin_desktop

  # Admin device secrets
  - path_regex: secrets/hosts/school-laptop\.ya?ml
    key_groups:
      - *admin_group

  - path_regex: secrets/hosts/nixos-devbox\.ya?ml
    key_groups:
      - *admin_group

  - path_regex: secrets/hosts/desktop\.ya?ml
    key_groups:
      - *admin_group

  # Non-admin device secrets: admin + device keys in same group (either can decrypt)
  - path_regex: secrets/hosts/laptop\.ya?ml
    key_groups:
      - age:
          - *admin_nixos_devbox
          - *admin_school_laptop
          - *laptop

  - path_regex: secrets/hosts/core-vm-gitea-01\.ya?ml
    key_groups:
      - age:
          - *admin_nixos_devbox
          - *admin_school_laptop
          - *core_vm_gitea_01

  - path_regex: secrets/hosts/core-vm-nixhelper-01\.ya?ml
    key_groups:
      - age:
          - *admin_nixos_devbox
          - *admin_school_laptop
          - *core_vm_nixhelper_01

  # Service secrets
  - path_regex: secrets/service/mail\.ya?ml
    key_groups:
      - age:
          - *admin_nixos_devbox
          - *admin_school_laptop
          - *core_vm_gitea_01
  - path_regex: secrets/service/builder\.ya?ml
    key_groups:
      - age:
          - *admin_nixos_devbox
          - *admin_school_laptop
          - *core_vm_gitea_01
          - *core_vm_nixhelper_01
 
